# Option A: remote repos — pre-commit manages its own isolated environments.
# Consistent across all machines. Best for team projects.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^src/
        additional_dependencies: []   # add stubs here, e.g. "numpy", "scipy"
